<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body style="margin:0;padding:0;background:#f9fafb;font-family:Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f9fafb;padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:400px;background:#ffffff;border-radius:16px;padding:40px 32px;border:1px solid #f3f4f6;">
          <tr>
            <td align="center" style="padding-bottom:8px;">
              <div style="width:48px;height:48px;background:#ea580c;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;font-size:20px;color:white;font-weight:bold;line-height:48px;text-align:center;">PY</div>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:4px;">
              <p style="margin:0;font-size:18px;font-weight:600;color:#111827;">Pian Yi Catering</p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <p style="margin:0;font-size:13px;color:#6b7280;">Admin Dashboard</p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:16px;">
              <p style="margin:0;font-size:14px;color:#374151;">Your login code is:</p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <div style="display:inline-block;background:#f3f4f6;border-radius:12px;padding:16px 32px;">
                <span style="font-size:36px;font-weight:700;letter-spacing:10px;color:#111827;font-family:monospace;">{{ .Token }}</span>
              </div>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <p style="margin:0;font-size:13px;color:#6b7280;">Enter this code in the app to sign in.<br/>It expires in 1 hour.</p>
            </td>
          </tr>
          <tr>
            <td align="center">
              <p style="margin:0;font-size:12px;color:#9ca3af;">If you didn't request this, you can safely ignore this email.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
